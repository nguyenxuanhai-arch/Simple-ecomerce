apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-config
  labels:
    app.kubernetes.io/name: simple-ecommerce
data:
  APP_VERSION: "v1"
  SERVER_PORT: "8080"
  CORS_ALLOWED_ORIGINS: "*"
  MYSQL_DATABASE: "ecommerce"
  SPRING_DATASOURCE_URL: "jdbc:mysql://ecommerce-mysql:3306/ecommerce?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  SPRING_DATASOURCE_USERNAME: "root"
  BACKEND_URL: "http://ecommerce-backend-service"
